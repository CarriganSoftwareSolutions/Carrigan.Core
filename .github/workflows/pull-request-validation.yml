name: Pull Request Validation

on:
  pull_request:
    branches:
      - main
      - version/**
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  build-test:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore CarriganCore/CarriganCore.sln

      - name: Build
        run: dotnet build CarriganCore/CarriganCore.sln --configuration Release --no-restore

      - name: Test
        run: >-
          dotnet test CarriganCore/Carrigan.Core.Test/Carrigan.Core.Test.csproj
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/**/*.trx
            **/TestResults/**/coverage.cobertura.xml
