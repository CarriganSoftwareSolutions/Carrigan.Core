name: Publish to NuGet (version/0.x)

on:
  push:
    branches: [ version/0.x ]

jobs:
  build-pack-publish:
    runs-on: self-hosted
    env:
      NUGET_SOURCE: https://api.nuget.org/v3/index.json
      DOTNET_INSTALL_DIR: C:\actions-runner\dotnet   
      DOTNET_ROOT: C:\actions-runner\dotnet
    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug Git presence
        run: |
          where git
          git --version

      - name: Ensure dotnet install directory exists
        run: if not exist "C:\actions-runner\dotnet" mkdir "C:\actions-runner\dotnet"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
                    
      - name: dotnet info
        run: dotnet --info

      - name: Restore
        run: dotnet restore CarriganCore.sln

      - name: Build (Release)
        run: dotnet build CarriganCore.sln --configuration Release --no-restore

      - name: Pack solution
        run: dotnet pack CarriganCore.sln --configuration Release --no-build -o .\artifacts

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push .\artifacts\*.nupkg --api-key "%NUGET_API_KEY%" --source %NUGET_SOURCE% --skip-duplicate
          dotnet nuget push .\artifacts\*.snupkg --api-key "%NUGET_API_KEY%" --source %NUGET_SOURCE% --skip-duplicate
