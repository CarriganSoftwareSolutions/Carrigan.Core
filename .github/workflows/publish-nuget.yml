name: Publish to NuGet (version change)

on:
  push:
    branches: [ version/0.x ]

jobs:
  build-pack-publish:
    runs-on: self-hosted   # or 'windows-latest'
    env:
      NUGET_SOURCE: https://api.nuget.org/v3/index.json

    steps:
      - name: Debug Git presence
        run: |
            where git
            git --version
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git diff

      - name: Detect version changes
        id: changed
        shell: pwsh
        run: |
          $base = (git rev-parse HEAD~1)
          $files = git diff --name-only $base HEAD -- '**/*.csproj'
          if (-not $files) { echo "changed=false" >> $env:GITHUB_OUTPUT; exit 0 }

          $pattern = '<Version>|<VersionPrefix>|<VersionSuffix>'
          $changed = $false
          foreach ($f in $files) {
            $diff = git diff $base HEAD -- "$f"
            if ($diff -match $pattern) { $changed = $true }
          }
          echo "changed=$changed" >> $env:GITHUB_OUTPUT

      - name: Stop if no version bump
        if: steps.changed.outputs.changed != 'True'
        run: echo "No version changes detected; skipping publish."

      - name: Setup .NET
        if: steps.changed.outputs.changed == 'True'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        if: steps.changed.outputs.changed == 'True'
        run: dotnet restore CarriganCore.sln

      - name: Build (Release)
        if: steps.changed.outputs.changed == 'True'
        run: dotnet build CarriganCore.sln --configuration Release --no-restore

      - name: Pack solution
        if: steps.changed.outputs.changed == 'True'
        run: dotnet pack CarriganCore.sln --configuration Release --no-build -o .\artifacts

      - name: Publish to NuGet
        if: steps.changed.outputs.changed == 'True'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push .\artifacts\*.nupkg --api-key "$env:NUGET_API_KEY" --source $env:NUGET_SOURCE --skip-duplicate
          dotnet nuget push .\artifacts\*.snupkg --api-key "$env:NUGET_API_KEY" --source $env:NUGET_SOURCE --skip-duplicate
